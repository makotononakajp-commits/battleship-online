<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>海戦ゲーム（UI改善版）</title>
<style>
.small-note { font-size: 14px; color: #555; margin-top: 8px; }
</style>
</head>
<body>

<div id="placementControls">
  <button id="rotateBtn">船を回転</button>
  <button id="placeSelectedBtn">この位置に配置</button>
  <button id="submitPlacementBtn">この配置で決定</button>
  <button id="resetPlacementBtn">配置をやり直す</button>

  <div class="small-note">
    配置中は、まず盤面を選択し、必要なら回転し、「この位置に配置」で確定します。
  </div>
</div>

<script>
const state = {
  phase: "placement",
  placementSubmitted: false
};

const isTouchDevice =
  "ontouchstart" in window || navigator.maxTouchPoints > 0;

function render() {
  const placementControls = document.getElementById("placementControls");

  placementControls.style.display =
    isTouchDevice &&
    state.phase === "placement" &&
    !state.placementSubmitted
      ? "block"
      : "none";
}

render();
</script>

</body>
</html>
